- name: setting up hostname
  hostname:
    name: "{{component}}"

- name: Disable default MySQL module
  shell: yum module disable {{component}} -y

- name: creating repo {{component}} file
  copy:
    src: mysql.repo
    dest: /etc/yum.repos.d/

- name: installing mysql server
  yum:
    name: mysql-community-server
    state: installed

- name: Get latest MySQL temporary password
  shell: grep 'temporary password' /var/log/mysqld.log | tail -1 | awk '{print $NF}'
  register: mysql_temp_pass

- name: Set MySQL root password and accessing mysql from anywhere
  shell: |
    mysql --connect-expired-password -uroot -p'{{ mysql_temp_pass.stdout }}' -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{mysql_password}}';"
    mysql -uroot -p'{{mysql_password}}' -e "CREATE USER IF NOT EXISTS 'root'@'%' IDENTIFIED BY '{{mysql_password}}';"
    mysql -uroot -p'{{mysql_password}}' -e "GRANT ALL PRIVILEGES ON *.* TO 'root'@'%' WITH GRANT OPTION;"
    mysql -uroot -p'{{mysql_password}}' -e "FLUSH PRIVILEGES;"
    if ! grep -q '^bind-address' /etc/my.cnf; then
      sed -i '/^\[mysqld\]/a bind-address = 0.0.0.0' /etc/my.cnf
    else
      sed -i 's/^bind-address.*/bind-address = 0.0.0.0/' /etc/my.cnf
    fi

- name: Enable and Restart "{{component}}" service
  systemd:
    name: mysqld
    state: restarted
    enabled: yes