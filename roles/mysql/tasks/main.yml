- name: setting up hostname
  hostname:
    name: "{{component}}"

- name: Disable default MySQL module
  shell: yum module disable {{component}} -y

- name: creating repo {{component}} file
  copy:
    src: mysql.repo
    dest: /etc/yum.repos.d/

- name: installing mysql server
  yum:
    name: mysql-community-server
    state: installed

- name: Enable and Restart "{{component}}" service
  systemd:
    name: mysqld
    state: restarted
    enabled: yes

- name: Check if MySQL root can login
  shell: mysql -uroot -p'{{ mysql_password }}' -e "SELECT 1;"
  register: mysql_root_check
  failed_when: false
  changed_when: false

- name: Get latest MySQL temporary password
  shell: grep 'temporary password' /var/log/mysqld.log | tail -1 | awk '{print $NF}'
  register: mysql_temp_pass
  when: mysql_root_check.rc != 0

- name: Set MySQL root password using temporary password
  shell: >
    mysql --connect-expired-password -uroot -p'{{ mysql_temp_pass.stdout }}'
    -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mysql_password }}';"
  when: mysql_root_check.rc != 0

