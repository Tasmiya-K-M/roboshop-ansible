- name: setting up hostname
  hostname:
    name: "{{component}}"

- name: Disable default MySQL module
  shell: dnf module disable {{component}} -y

- name: creating repo {{component}} file
  copy:
    src: mysql.repo
    dest: /etc/yum.repos.d/

- name: installing mysql server
  yum:
    name: mysql-community-server
    state: installed

- name: Enable and Restart "{{component}}" service
  service:
    name: mysqld
    state: restarted
    enabled: yes

- name: Get temporary root password
  shell: grep 'temporary password' /var/log/mysqld.log | awk '{print $NF}'
  register: mysql_temp_password
  changed_when: false

- name: Set MySQL root password
  shell: >
    mysql --connect-expired-password
    -u root -p'{{ mysql_temp_password.stdout }}'
    -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mysql_password }}';"
  when: mysql_temp_password.stdout != ""